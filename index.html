<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>50个常见不规则动词练习</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --good: #16a34a;
      --bad: #dc2626;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.5;
    }
    .container {
      max-width: 1000px;
      margin: 32px auto;
      padding: 0 16px 32px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,.04);
      padding: 20px;
      margin-bottom: 18px;
    }
    h1, h2 { margin: 0 0 12px; }
    p { margin: 0 0 10px; color: var(--muted); }
    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 10px;
    }
    th, td {
      border-bottom: 1px solid var(--border);
      text-align: left;
      padding: 10px 8px;
      font-size: 14px;
    }
    th { background: #f9fafb; }
    tr:hover td { background: #fafcff; }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
      align-items: center;
    }
    button {
      border: none;
      background: var(--primary);
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    button.secondary { background: #4b5563; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    input {
      width: 220px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 14px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 10px;
    }
    .feedback { font-weight: 700; margin-top: 10px; }
    .ok { color: var(--good); }
    .err { color: var(--bad); }
    .score {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
    }
    .small { font-size: 13px; color: var(--muted); }
    @media (max-width: 700px) {
      .row { grid-template-columns: 1fr; }
      input { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>动词过去式 & 过去分词练习（50个常见不规则动词）</h1>
      <p>使用说明：先看下方词表，再在练习区输入过去式（Past Simple）和过去分词（Past Participle）。</p>
    </div>

    <div class="card">
      <h2>📚 词表（50个）</h2>
      <table id="verbTable">
        <thead>
          <tr>
            <th>#</th>
            <th>原形（Base）</th>
            <th>过去式（Past）</th>
            <th>过去分词（P.P.）</th>
            <th>中文</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card">
      <h2>📝 随机练习</h2>
      <p class="small">支持大小写不敏感；如果有两种拼写（如 learned/learnt），都可判对。</p>
      <div id="question" class="score"></div>
      <div class="row">
        <div>
          <label for="pastInput">过去式（Past）</label><br/>
          <input id="pastInput" type="text" placeholder="请输入过去式" />
        </div>
        <div>
          <label for="ppInput">过去分词（Past Participle）</label><br/>
          <input id="ppInput" type="text" placeholder="请输入过去分词" />
        </div>
      </div>
      <div class="controls">
        <button id="checkBtn">检查答案</button>
        <button id="nextBtn" class="secondary">下一题</button>
        <button id="restartBtn" class="secondary">重置分数</button>
        <span class="score" id="score">得分：0 / 0</span>
      </div>
      <div id="feedback" class="feedback"></div>
    </div>
  </div>

  <script>
    const verbs = [
      { base: "be", past: ["was", "were"], pp: ["been"], zh: "是" },
      { base: "become", past: ["became"], pp: ["become"], zh: "变成" },
      { base: "begin", past: ["began"], pp: ["begun"], zh: "开始" },
      { base: "break", past: ["broke"], pp: ["broken"], zh: "打破" },
      { base: "bring", past: ["brought"], pp: ["brought"], zh: "带来" },
      { base: "build", past: ["built"], pp: ["built"], zh: "建造" },
      { base: "buy", past: ["bought"], pp: ["bought"], zh: "买" },
      { base: "choose", past: ["chose"], pp: ["chosen"], zh: "选择" },
      { base: "come", past: ["came"], pp: ["come"], zh: "来" },
      { base: "cost", past: ["cost"], pp: ["cost"], zh: "花费" },
      { base: "cut", past: ["cut"], pp: ["cut"], zh: "切" },
      { base: "do", past: ["did"], pp: ["done"], zh: "做" },
      { base: "draw", past: ["drew"], pp: ["drawn"], zh: "画" },
      { base: "drink", past: ["drank"], pp: ["drunk"], zh: "喝" },
      { base: "drive", past: ["drove"], pp: ["driven"], zh: "驾驶" },
      { base: "eat", past: ["ate"], pp: ["eaten"], zh: "吃" },
      { base: "fall", past: ["fell"], pp: ["fallen"], zh: "落下" },
      { base: "feel", past: ["felt"], pp: ["felt"], zh: "感觉" },
      { base: "find", past: ["found"], pp: ["found"], zh: "找到" },
      { base: "fly", past: ["flew"], pp: ["flown"], zh: "飞" },
      { base: "forget", past: ["forgot"], pp: ["forgotten", "forgot"], zh: "忘记" },
      { base: "get", past: ["got"], pp: ["got", "gotten"], zh: "得到" },
      { base: "give", past: ["gave"], pp: ["given"], zh: "给" },
      { base: "go", past: ["went"], pp: ["gone"], zh: "去" },
      { base: "grow", past: ["grew"], pp: ["grown"], zh: "生长" },
      { base: "have", past: ["had"], pp: ["had"], zh: "有" },
      { base: "hear", past: ["heard"], pp: ["heard"], zh: "听见" },
      { base: "hold", past: ["held"], pp: ["held"], zh: "握住" },
      { base: "keep", past: ["kept"], pp: ["kept"], zh: "保持" },
      { base: "know", past: ["knew"], pp: ["known"], zh: "知道" },
      { base: "learn", past: ["learned", "learnt"], pp: ["learned", "learnt"], zh: "学习" },
      { base: "leave", past: ["left"], pp: ["left"], zh: "离开" },
      { base: "lose", past: ["lost"], pp: ["lost"], zh: "失去" },
      { base: "make", past: ["made"], pp: ["made"], zh: "制作" },
      { base: "meet", past: ["met"], pp: ["met"], zh: "遇见" },
      { base: "pay", past: ["paid"], pp: ["paid"], zh: "付款" },
      { base: "put", past: ["put"], pp: ["put"], zh: "放" },
      { base: "read", past: ["read"], pp: ["read"], zh: "读" },
      { base: "ride", past: ["rode"], pp: ["ridden"], zh: "骑" },
      { base: "run", past: ["ran"], pp: ["run"], zh: "跑" },
      { base: "say", past: ["said"], pp: ["said"], zh: "说" },
      { base: "see", past: ["saw"], pp: ["seen"], zh: "看见" },
      { base: "sell", past: ["sold"], pp: ["sold"], zh: "卖" },
      { base: "send", past: ["sent"], pp: ["sent"], zh: "发送" },
      { base: "sing", past: ["sang"], pp: ["sung"], zh: "唱" },
      { base: "sit", past: ["sat"], pp: ["sat"], zh: "坐" },
      { base: "sleep", past: ["slept"], pp: ["slept"], zh: "睡觉" },
      { base: "speak", past: ["spoke"], pp: ["spoken"], zh: "说话" },
      { base: "take", past: ["took"], pp: ["taken"], zh: "拿" },
      { base: "write", past: ["wrote"], pp: ["written"], zh: "写" }
    ];

    const tbody = document.querySelector("#verbTable tbody");
    verbs.forEach((v, i) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${i + 1}</td>
        <td>${v.base}</td>
        <td>${v.past.join(" / ")}</td>
        <td>${v.pp.join(" / ")}</td>
        <td>${v.zh}</td>
      `;
      tbody.appendChild(tr);
    });

    const question = document.getElementById("question");
    const pastInput = document.getElementById("pastInput");
    const ppInput = document.getElementById("ppInput");
    const feedback = document.getElementById("feedback");
    const scoreEl = document.getElementById("score");

    let current = null;
    let total = 0;
    let correct = 0;

    function pickRandom() {
      current = verbs[Math.floor(Math.random() * verbs.length)];
      question.textContent = `请填写动词 “${current.base}（${current.zh}）” 的过去式和过去分词`;
      pastInput.value = "";
      ppInput.value = "";
      feedback.textContent = "";
      feedback.className = "feedback";
      pastInput.focus();
    }

    function normalize(s) {
      return s.trim().toLowerCase();
    }

    function checkAnswer() {
      const pastAns = normalize(pastInput.value);
      const ppAns = normalize(ppInput.value);
      const pastOk = current.past.map(normalize).includes(pastAns);
      const ppOk = current.pp.map(normalize).includes(ppAns);

      total += 1;
      if (pastOk && ppOk) {
        correct += 1;
        feedback.textContent = "✅ 正确！太棒了！";
        feedback.className = "feedback ok";
      } else {
        feedback.textContent = `❌ 再试试：${current.base} 的过去式是 ${current.past.join("/")}，过去分词是 ${current.pp.join("/")}。`;
        feedback.className = "feedback err";
      }
      scoreEl.textContent = `得分：${correct} / ${total}`;
    }

    document.getElementById("checkBtn").addEventListener("click", checkAnswer);
    document.getElementById("nextBtn").addEventListener("click", pickRandom);
    document.getElementById("restartBtn").addEventListener("click", () => {
      total = 0;
      correct = 0;
      scoreEl.textContent = "得分：0 / 0";
      pickRandom();
    });

    [pastInput, ppInput].forEach(input => {
      input.addEventListener("keydown", e => {
        if (e.key === "Enter") checkAnswer();
      });
    });

    pickRandom();
  </script>
</body>
</html>

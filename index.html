<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>不规则动词课堂互动游戏（50词）</title>
  <style>
    :root {
      --bg: #f2f6ff;
      --card: #ffffff;
      --ink: #1f2a44;
      --muted: #61708f;
      --primary: #3b82f6;
      --primary-deep: #2563eb;
      --good: #16a34a;
      --bad: #dc2626;
      --warn: #f59e0b;
      --border: #dce5f7;
      --shadow: 0 14px 30px rgba(37, 99, 235, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 20% 10%, #ffffff 0%, #edf3ff 45%, #e6eeff 100%);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .screen {
      display: none;
      animation: fade .25s ease;
    }

    .screen.active { display: block; }

    @keyframes fade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 22px;
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 44px);
      letter-spacing: 1px;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 20px);
    }

    .setting-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
      margin-top: 14px;
    }

    .setting h3 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      border: 2px solid var(--border);
      border-radius: 999px;
      padding: 10px 16px;
      background: #fff;
      font-size: 17px;
      cursor: pointer;
      user-select: none;
      transition: .15s;
    }

    .chip.active {
      border-color: var(--primary);
      background: #eff6ff;
      color: var(--primary-deep);
      font-weight: 700;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
      align-items: center;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 20px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .08s ease, opacity .2s;
    }

    button:active { transform: scale(.98); }

    .btn-main {
      background: linear-gradient(135deg, var(--primary), var(--primary-deep));
      color: #fff;
    }

    .btn-sub {
      background: #e5ecfc;
      color: #274690;
    }

    .btn-danger {
      background: #fee2e2;
      color: #b91c1c;
    }

    .status-bar {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .status-item {
      background: #f8fbff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      text-align: center;
      min-height: 82px;
    }

    .status-item .label {
      font-size: 14px;
      color: var(--muted);
    }

    .status-item .value {
      margin-top: 6px;
      font-size: clamp(22px, 2.8vw, 36px);
      font-weight: 800;
    }

    .question-area {
      text-align: center;
      padding: 24px;
    }

    .question-type {
      color: var(--muted);
      font-size: 18px;
      margin-bottom: 8px;
    }

    .question-main {
      font-size: clamp(32px, 5vw, 64px);
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1.2;
    }

    .question-sub {
      font-size: clamp(20px, 2.4vw, 32px);
      color: #3b4b6b;
      margin-top: 8px;
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .choice-btn {
      border: 2px solid #d7e4ff;
      background: #f8fbff;
      border-radius: 14px;
      padding: 18px 14px;
      font-size: clamp(24px, 3.2vw, 38px);
      font-weight: 700;
      color: #1f2a44;
      cursor: pointer;
      position: relative;
      min-height: 96px;
    }

    .choice-btn small {
      position: absolute;
      top: 8px;
      left: 10px;
      color: #7b8cab;
      font-size: 14px;
      font-weight: 600;
    }

    .choice-btn.correct { border-color: #22c55e; background: #ecfdf5; }
    .choice-btn.wrong { border-color: #ef4444; background: #fef2f2; }
    .choice-btn.locked { pointer-events: none; }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 12px;
    }

    .input-wrap label {
      display: block;
      font-size: 18px;
      margin-bottom: 6px;
      color: #304161;
      font-weight: 700;
      text-align: left;
    }

    .input-wrap input {
      width: 100%;
      border: 2px solid #d9e4ff;
      border-radius: 12px;
      padding: 14px;
      font-size: 28px;
      text-align: center;
    }

    .input-wrap input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(59,130,246,.15);
    }

    .feedback {
      margin-top: 16px;
      border-radius: 14px;
      padding: 14px;
      font-size: clamp(18px, 2vw, 28px);
      font-weight: 800;
      text-align: center;
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .feedback.good { background: #ecfdf5; color: #166534; border: 2px solid #bbf7d0; }
    .feedback.bad { background: #fef2f2; color: #991b1b; border: 2px solid #fecaca; }
    .feedback.idle { background: #f4f7ff; color: #50618a; border: 2px dashed #d3def7; }

    .progress-track {
      margin-top: 10px;
      height: 14px;
      border-radius: 999px;
      background: #e8efff;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      transition: width .2s ease;
    }

    .timer-wrap {
      margin-top: 8px;
      font-weight: 700;
      color: #475f92;
    }

    .result-score {
      font-size: clamp(40px, 8vw, 84px);
      font-weight: 900;
      text-align: center;
      color: #1e40af;
      margin: 8px 0;
    }

    .medal {
      text-align: center;
      font-size: 32px;
      margin-bottom: 8px;
    }

    .mini {
      font-size: 14px;
      color: var(--muted);
    }

    details {
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      background: #fbfdff;
    }

    summary {
      cursor: pointer;
      font-weight: 700;
      font-size: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 16px;
    }

    th, td {
      border-bottom: 1px solid #e5ecff;
      padding: 8px;
      text-align: left;
    }

    th { background: #f4f8ff; }

    .highlight {
      animation: pop .3s ease;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      45% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    @media (max-width: 900px) {
      .status-bar { grid-template-columns: 1fr 1fr; }
      .choices { grid-template-columns: 1fr; }
      .input-row { grid-template-columns: 1fr; }
      button { width: 100%; }
      .btn-row { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section id="startScreen" class="screen active">
      <div class="card hero">
        <h1>🎮 不规则动词课堂互动游戏</h1>
        <p>保留过去分词练习 + 新增现在完成时句子挑战 · 投屏友好</p>
      </div>

      <div class="card">
        <div class="setting-grid">
          <div class="setting">
            <h3>① 选择练习关卡</h3>
            <div id="lessonChips" class="chips"></div>
          </div>
          <div id="modeSetting" class="setting">
            <h3>② 过去分词玩法</h3>
            <div id="modeChips" class="chips"></div>
          </div>
          <div class="setting">
            <h3>③ 课堂设置</h3>
            <div class="chips">
              <button id="toggleSound" class="chip active" type="button">🔊 音效：开</button>
              <button id="toggleWrongOnly" class="chip" type="button">错题优先：关</button>
            </div>
            <p class="mini">提示：数字键 1-4 可选答案，Enter 可提交。句子关卡里也支持快速作答。</p>
          </div>
        </div>
        <div class="btn-row">
          <button id="startBtn" class="btn-main" type="button">开始游戏</button>
        </div>
      </div>

      <div class="card">
        <details>
          <summary>📚 查看内置词库（50词）</summary>
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>原形（base）</th>
                <th>过去式（past）</th>
                <th>过去分词（pp）</th>
                <th>中文（zh）</th>
              </tr>
            </thead>
            <tbody id="verbTableBody"></tbody>
          </table>
        </details>
      </div>
    </section>

    <section id="gameScreen" class="screen">
      <div class="card">
        <div class="status-bar">
          <div class="status-item"><div class="label">模式</div><div id="modeLabel" class="value">-</div></div>
          <div class="status-item"><div class="label">当前得分</div><div id="scoreLabel" class="value">0</div></div>
          <div class="status-item"><div class="label">连击</div><div id="comboLabel" class="value">0</div></div>
          <div class="status-item"><div class="label">进度</div><div id="progressLabel" class="value">0/0</div></div>
          <div class="status-item"><div class="label">剩余</div><div id="remainLabel" class="value">0</div></div>
        </div>
        <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
        <div id="timerWrap" class="timer-wrap" hidden>⏱️ 剩余时间：<span id="timerLabel">60</span> 秒</div>
      </div>

      <div class="card question-area">
        <div id="questionType" class="question-type"></div>
        <div id="questionMain" class="question-main"></div>
        <div id="questionSub" class="question-sub"></div>

        <div id="choiceArea" class="choices"></div>

        <div id="inputArea" class="input-row" hidden>
          <div class="input-wrap">
            <label for="ppInput">过去分词（pp）</label>
            <input id="ppInput" autocomplete="off" placeholder="输入过去分词" />
          </div>
        </div>

        <div id="feedback" class="feedback idle">准备好了吗？点击或键盘作答！</div>

        <div class="btn-row" style="justify-content:center;">
          <button id="submitBtn" class="btn-main" type="button" hidden>提交答案（Enter）</button>
          <button id="nextBtn" class="btn-sub" type="button" hidden>下一题</button>
          <button id="backBtn" class="btn-danger" type="button">返回开始页</button>
        </div>
      </div>
    </section>

    <section id="resultScreen" class="screen">
      <div class="card">
        <h2 style="margin:0;font-size:34px;text-align:center;">🏁 本轮结束：班级挑战结果</h2>
        <div id="medal" class="medal">⭐</div>
        <div id="finalScore" class="result-score">0</div>
        <p id="resultText" style="text-align:center;font-size:22px;margin:0;"></p>
        <div class="status-bar" style="margin-top:14px;">
          <div class="status-item"><div class="label">正确题数</div><div id="correctCount" class="value">0</div></div>
          <div class="status-item"><div class="label">总作答题数</div><div id="answerCount" class="value">0</div></div>
          <div class="status-item"><div class="label">正确率</div><div id="accuracy" class="value">0%</div></div>
          <div class="status-item"><div class="label">最高连击</div><div id="bestCombo" class="value">0</div></div>
          <div class="status-item"><div class="label">错题数</div><div id="wrongCount" class="value">0</div></div>
        </div>

        <div class="btn-row" style="justify-content:center; margin-top:16px;">
          <button id="retryWrongBtn" class="btn-main" type="button">错题再练</button>
          <button id="playAgainBtn" class="btn-sub" type="button">再来一轮</button>
          <button id="toHomeBtn" class="btn-danger" type="button">返回首页</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    // ===== 50个常见不规则动词词库（后续替换最方便的位置） =====
    const VERBS = [
      { base: "be", past: ["was", "were"], pp: ["been"], zh: "是" },
      { base: "become", past: ["became"], pp: ["become"], zh: "变成" },
      { base: "begin", past: ["began"], pp: ["begun"], zh: "开始" },
      { base: "break", past: ["broke"], pp: ["broken"], zh: "打破" },
      { base: "bring", past: ["brought"], pp: ["brought"], zh: "带来" },
      { base: "build", past: ["built"], pp: ["built"], zh: "建造" },
      { base: "buy", past: ["bought"], pp: ["bought"], zh: "买" },
      { base: "choose", past: ["chose"], pp: ["chosen"], zh: "选择" },
      { base: "come", past: ["came"], pp: ["come"], zh: "来" },
      { base: "cost", past: ["cost"], pp: ["cost"], zh: "花费" },
      { base: "cut", past: ["cut"], pp: ["cut"], zh: "切" },
      { base: "do", past: ["did"], pp: ["done"], zh: "做" },
      { base: "draw", past: ["drew"], pp: ["drawn"], zh: "画" },
      { base: "drink", past: ["drank"], pp: ["drunk"], zh: "喝" },
      { base: "drive", past: ["drove"], pp: ["driven"], zh: "驾驶" },
      { base: "eat", past: ["ate"], pp: ["eaten"], zh: "吃" },
      { base: "fall", past: ["fell"], pp: ["fallen"], zh: "落下" },
      { base: "feel", past: ["felt"], pp: ["felt"], zh: "感觉" },
      { base: "find", past: ["found"], pp: ["found"], zh: "找到" },
      { base: "fly", past: ["flew"], pp: ["flown"], zh: "飞" },
      { base: "forget", past: ["forgot"], pp: ["forgotten", "forgot"], zh: "忘记" },
      { base: "get", past: ["got"], pp: ["got", "gotten"], zh: "得到" },
      { base: "give", past: ["gave"], pp: ["given"], zh: "给" },
      { base: "go", past: ["went"], pp: ["gone"], zh: "去" },
      { base: "grow", past: ["grew"], pp: ["grown"], zh: "生长" },
      { base: "have", past: ["had"], pp: ["had"], zh: "有" },
      { base: "hear", past: ["heard"], pp: ["heard"], zh: "听见" },
      { base: "hold", past: ["held"], pp: ["held"], zh: "握住" },
      { base: "keep", past: ["kept"], pp: ["kept"], zh: "保持" },
      { base: "know", past: ["knew"], pp: ["known"], zh: "知道" },
      { base: "learn", past: ["learned", "learnt"], pp: ["learned", "learnt"], zh: "学习" },
      { base: "leave", past: ["left"], pp: ["left"], zh: "离开" },
      { base: "lose", past: ["lost"], pp: ["lost"], zh: "失去" },
      { base: "make", past: ["made"], pp: ["made"], zh: "制作" },
      { base: "meet", past: ["met"], pp: ["met"], zh: "遇见" },
      { base: "pay", past: ["paid"], pp: ["paid"], zh: "付款" },
      { base: "put", past: ["put"], pp: ["put"], zh: "放" },
      { base: "read", past: ["read"], pp: ["read"], zh: "读" },
      { base: "ride", past: ["rode"], pp: ["ridden"], zh: "骑" },
      { base: "run", past: ["ran"], pp: ["run"], zh: "跑" },
      { base: "say", past: ["said"], pp: ["said"], zh: "说" },
      { base: "see", past: ["saw"], pp: ["seen"], zh: "看见" },
      { base: "sell", past: ["sold"], pp: ["sold"], zh: "卖" },
      { base: "send", past: ["sent"], pp: ["sent"], zh: "发送" },
      { base: "sing", past: ["sang"], pp: ["sung"], zh: "唱" },
      { base: "sit", past: ["sat"], pp: ["sat"], zh: "坐" },
      { base: "sleep", past: ["slept"], pp: ["slept"], zh: "睡觉" },
      { base: "speak", past: ["spoke"], pp: ["spoken"], zh: "说话" },
      { base: "take", past: ["took"], pp: ["taken"], zh: "拿" },
      { base: "write", past: ["wrote"], pp: ["written"], zh: "写" }
    ];

    // ===== 新增：现在完成时句子挑战题库（后续可直接增减） =====
    const PRESENT_PERFECT_SENTENCES = [
      { subject: "I", aux: "have", pastParticiple: "eaten", object: "an apple", fullSentence: "I have eaten an apple.", zh: "我吃过一个苹果。" },
      { subject: "I", aux: "have", pastParticiple: "done", object: "my homework", fullSentence: "I have done my homework.", zh: "我已经做了作业。" },
      { subject: "He", aux: "has", pastParticiple: "seen", object: "a bird", fullSentence: "He has seen a bird.", zh: "他看见过一只鸟。" },
      { subject: "She", aux: "has", pastParticiple: "ridden", object: "a bike", fullSentence: "She has ridden a bike.", zh: "她骑过自行车。" },
      { subject: "We", aux: "have", pastParticiple: "gone", object: "to the zoo", fullSentence: "We have gone to the zoo.", zh: "我们去过动物园。" },
      { subject: "They", aux: "have", pastParticiple: "broken", object: "a toy", fullSentence: "They have broken a toy.", zh: "他们弄坏了一个玩具。" },
      { subject: "She", aux: "has", pastParticiple: "written", object: "a letter", fullSentence: "She has written a letter.", zh: "她写过一封信。" },
      { subject: "He", aux: "has", pastParticiple: "drawn", object: "a picture", fullSentence: "He has drawn a picture.", zh: "他画过一幅画。" },
      { subject: "They", aux: "have", pastParticiple: "sung", object: "a song", fullSentence: "They have sung a song.", zh: "他们唱过一首歌。" },
      { subject: "We", aux: "have", pastParticiple: "read", object: "a book", fullSentence: "We have read a book.", zh: "我们读过一本书。" },
      { subject: "I", aux: "have", pastParticiple: "ridden", object: "a bike", fullSentence: "I have ridden a bike.", zh: "我骑过自行车。" },
      { subject: "She", aux: "has", pastParticiple: "done", object: "homework", fullSentence: "She has done homework.", zh: "她做了作业。" }
    ];

    const LESSON_TYPES = {
      pp_game: { label: "过去分词练习" },
      sentence_game: { label: "现在完成时句子挑战" }
    };

    const PP_MODES = {
      match: { label: "配对闯关", rounds: 20, timed: false },
      double: { label: "拼写挑战", rounds: 20, timed: false },
      speed: { label: "竞速模式", rounds: 50, timed: true, seconds: 60 }
    };

    const praise = ["太棒了！", "答得漂亮！", "继续连击！", "课堂MVP！", "稳住节奏！"];

    const state = {
      lessonType: "pp_game",
      mode: "match",
      soundOn: true,
      wrongOnly: false,
      queue: [],
      current: null,
      options: [],
      answeredLocked: false,
      score: 0,
      combo: 0,
      bestCombo: 0,
      answered: 0,
      correct: 0,
      wrongItems: [],
      timer: null,
      remainSeconds: 0,
      wrongRetryMode: false
    };

    const $ = (id) => document.getElementById(id);
    const screens = {
      start: $("startScreen"),
      game: $("gameScreen"),
      result: $("resultScreen")
    };

    const lessonChips = $("lessonChips");
    const modeChips = $("modeChips");
    const modeSetting = $("modeSetting");
    const choiceArea = $("choiceArea");
    const inputArea = $("inputArea");
    const submitBtn = $("submitBtn");
    const nextBtn = $("nextBtn");
    const feedback = $("feedback");

    function showScreen(name) {
      Object.values(screens).forEach(s => s.classList.remove("active"));
      screens[name].classList.add("active");
    }

    function shuffle(arr) {
      const clone = [...arr];
      for (let i = clone.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [clone[i], clone[j]] = [clone[j], clone[i]];
      }
      return clone;
    }

    function normalize(str) {
      return (str || "").trim().toLowerCase();
    }

    function safeBeep(ok = true) {
      if (!state.soundOn) return;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      const ctx = new Ctx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = ok ? 720 : 300;
      gain.gain.value = 0.0001;
      osc.connect(gain);
      gain.connect(ctx.destination);
      const now = ctx.currentTime;
      gain.gain.exponentialRampToValueAtTime(0.18, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
      osc.start(now);
      osc.stop(now + 0.18);
    }

    function renderWordTable() {
      const tbody = $("verbTableBody");
      tbody.innerHTML = VERBS.map((v, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${v.base}</td>
          <td>${v.past.join(" / ")}</td>
          <td>${v.pp.join(" / ")}</td>
          <td>${v.zh}</td>
        </tr>
      `).join("");
    }

    function renderChips() {
      lessonChips.innerHTML = Object.entries(LESSON_TYPES).map(([key, m]) =>
        `<button type="button" class="chip ${state.lessonType === key ? "active" : ""}" data-lesson="${key}">${m.label}</button>`
      ).join("");

      modeSetting.style.display = state.lessonType === "pp_game" ? "block" : "none";
      modeChips.innerHTML = Object.entries(PP_MODES).map(([key, m]) =>
        `<button type="button" class="chip ${state.mode === key ? "active" : ""}" data-mode="${key}">${m.label}</button>`
      ).join("");
    }

    function updateStatus() {
      const total = state.queue.length + state.answered;
      $("modeLabel").textContent = state.lessonType === "pp_game" ? PP_MODES[state.mode].label : LESSON_TYPES[state.lessonType].label;
      $("scoreLabel").textContent = state.score;
      $("comboLabel").textContent = `x${state.combo}`;
      $("progressLabel").textContent = `${state.answered}/${total}`;
      $("remainLabel").textContent = state.queue.length;
      const percent = total ? (state.answered / total) * 100 : 0;
      $("progressFill").style.width = `${percent}%`;
      if (state.lessonType === "pp_game" && state.mode === "speed") {
        $("timerWrap").hidden = false;
        $("timerLabel").textContent = state.remainSeconds;
      } else {
        $("timerWrap").hidden = true;
      }
    }

    function setFeedback(msg, type = "idle") {
      feedback.className = `feedback ${type}`;
      feedback.textContent = msg;
      feedback.classList.remove("highlight");
      void feedback.offsetWidth;
      feedback.classList.add("highlight");
    }

    function buildQueue() {
      if (state.lessonType === "sentence_game") {
        const pool = state.wrongOnly && state.wrongItems.length
          ? state.wrongItems.map(item => item.data)
          : PRESENT_PERFECT_SENTENCES;
        const rounds = Math.min(16, pool.length);
        state.queue = shuffle(pool).slice(0, rounds).map((item) => ({
          lessonType: "sentence_game",
          data: item,
          questionType: Math.random() > 0.45 ? "choose_pp" : "qa"
        }));
        return;
      }

      const pool = state.wrongOnly && state.wrongItems.length
        ? state.wrongItems.map(item => item.verb)
        : VERBS;
      const picked = shuffle(pool);
      const rounds = Math.min(PP_MODES[state.mode].rounds, picked.length);
      state.queue = picked.slice(0, rounds).map(v => ({ lessonType: "pp_game", verb: v, targetField: "pp" }));
    }

    function startGame() {
      clearInterval(state.timer);
      state.score = 0;
      state.combo = 0;
      state.bestCombo = 0;
      state.answered = 0;
      state.correct = 0;
      state.answeredLocked = false;
      if (!state.wrongRetryMode) state.wrongItems = [];

      buildQueue();
      if (state.lessonType === "pp_game" && state.mode === "speed") {
        state.remainSeconds = PP_MODES.speed.seconds;
        state.timer = setInterval(() => {
          state.remainSeconds -= 1;
          updateStatus();
          if (state.remainSeconds <= 0) endGame();
        }, 1000);
      }
      showScreen("game");
      renderNextQuestion();
      updateStatus();
    }

    function buildChoices(correctAns, pool) {
      const wrongPool = shuffle(pool.filter(item => normalize(item) !== normalize(correctAns))).slice(0, 3);
      return shuffle([correctAns, ...wrongPool]);
    }

    function buildSentenceQuestion(item) {
      const { data, questionType } = item;
      if (questionType === "qa") {
        const question = `Have you ever ${data.pastParticiple} ${data.object}?`;
        const shouldYes = Math.random() > 0.5;
        return {
          type: "qa",
          main: question,
          sub: `提示：选择一个自然回答（${data.zh}）`,
          options: ["Yes, I have.", "No, I haven't."],
          answer: shouldYes ? "Yes, I have." : "No, I haven't.",
          answerText: shouldYes ? "Yes, I have." : "No, I haven't.",
          explain: "问答搭配练习"
        };
      }

      const stem = `${data.subject} ${data.aux} ___ ${data.object}.`;
      const ppPool = [...new Set(PRESENT_PERFECT_SENTENCES.map(s => s.pastParticiple))];
      return {
        type: "choose_pp",
        main: stem,
        sub: `中文：${data.zh}`,
        options: buildChoices(data.pastParticiple, ppPool),
        answer: data.pastParticiple,
        answerText: data.fullSentence,
        explain: "选择正确过去分词"
      };
    }

    function renderNextQuestion() {
      state.answeredLocked = false;
      nextBtn.hidden = true;
      choiceArea.innerHTML = "";
      submitBtn.hidden = true;
      submitBtn.disabled = false;
      inputArea.hidden = true;

      if (!state.queue.length) {
        endGame();
        return;
      }

      state.current = state.queue.shift();

      if (state.current.lessonType === "sentence_game") {
        const q = buildSentenceQuestion(state.current);
        state.current.view = q;
        $("questionType").textContent = `现在完成时句子挑战：${q.explain}`;
        $("questionMain").textContent = q.main;
        $("questionSub").textContent = q.sub;
        state.options = q.options;
        state.options.forEach((opt, idx) => {
          const btn = document.createElement("button");
          btn.className = "choice-btn";
          btn.type = "button";
          btn.dataset.index = idx;
          btn.innerHTML = `<small>${idx + 1}</small>${opt}`;
          btn.addEventListener("click", () => handleChoice(idx));
          choiceArea.appendChild(btn);
        });
        setFeedback("来试试吧！选出最合适的答案。", "idle");
        updateStatus();
        return;
      }

      const { verb } = state.current;
      $("questionMain").textContent = verb.base;
      $("questionSub").textContent = `中文：${verb.zh}`;

      if (state.mode === "double") {
        $("questionType").textContent = "拼写挑战：请输入过去分词（pp）";
        inputArea.hidden = false;
        submitBtn.hidden = false;
        $("ppInput").value = "";
        $("ppInput").focus();
      } else {
        $("questionType").textContent = "配对选择：请选择正确的过去分词（pp）";
        const correct = verb.pp[0];
        state.options = buildChoices(correct, VERBS.map(v => v.pp[0]));

        state.options.forEach((opt, idx) => {
          const btn = document.createElement("button");
          btn.className = "choice-btn";
          btn.type = "button";
          btn.dataset.index = idx;
          btn.innerHTML = `<small>${idx + 1}</small>${opt}`;
          btn.addEventListener("click", () => handleChoice(idx));
          choiceArea.appendChild(btn);
        });
      }

      setFeedback("请作答！", "idle");
      updateStatus();
    }

    function gainScore(isCorrect) {
      if (isCorrect) {
        state.correct += 1;
        state.combo += 1;
        state.bestCombo = Math.max(state.bestCombo, state.combo);
        const bonus = state.combo >= 3 ? 2 : 0;
        state.score += 10 + bonus;
        return bonus;
      }
      state.combo = 0;
      return 0;
    }

    function rememberWrong() {
      const key = state.current.lessonType === "sentence_game"
        ? state.current.data.fullSentence
        : state.current.verb.base;
      const exists = state.wrongItems.some(item => (item.data?.fullSentence || item.verb?.base) === key);
      if (!exists) state.wrongItems.push({ ...state.current });
    }

    function lockQuestion() {
      state.answeredLocked = true;
      state.answered += 1;
      nextBtn.hidden = (state.lessonType === "pp_game" && state.mode === "speed");
      submitBtn.disabled = true;
      updateStatus();
    }

    function getCurrentAnswer() {
      if (state.current.lessonType === "sentence_game") {
        return {
          rightValues: [state.current.view.answer],
          rightText: state.current.view.answerText
        };
      }
      return {
        rightValues: state.current.verb.pp,
        rightText: state.current.verb.pp.join(" / ")
      };
    }

    function handleChoice(index) {
      if (state.answeredLocked) return;
      const chosen = state.options[index];
      const ans = getCurrentAnswer();
      const right = ans.rightValues.map(normalize).includes(normalize(chosen));
      const bonus = gainScore(right);

      const buttons = [...choiceArea.querySelectorAll(".choice-btn")];
      buttons.forEach((btn, i) => {
        btn.classList.add("locked");
        const text = state.options[i];
        const isRight = ans.rightValues.map(normalize).includes(normalize(text));
        if (isRight) btn.classList.add("correct");
        if (i === index && !right) btn.classList.add("wrong");
      });

      if (right) {
        safeBeep(true);
        const tail = bonus ? ` 连击奖励 +${bonus} 分！` : "";
        setFeedback(`✅ ${praise[Math.floor(Math.random() * praise.length)]} +10分！${tail}`, "good");
      } else {
        safeBeep(false);
        rememberWrong();
        setFeedback(`❌ 正确答案：${ans.rightText}`, "bad");
      }

      lockQuestion();
      if (state.lessonType === "pp_game" && state.mode === "speed") setTimeout(renderNextQuestion, 550);
    }

    function handleDoubleSubmit() {
      if (state.answeredLocked || state.current.lessonType !== "pp_game") return;
      const p2 = normalize($("ppInput").value);
      const right = state.current.verb.pp.map(normalize).includes(p2);
      const bonus = gainScore(right);

      if (right) {
        safeBeep(true);
        const tail = bonus ? ` 连击奖励 +${bonus} 分！` : "";
        setFeedback(`✅ 拼写正确！ +10分！${tail}`, "good");
      } else {
        safeBeep(false);
        rememberWrong();
        setFeedback(`❌ 正确答案：${state.current.verb.pp.join("/")}`, "bad");
      }

      lockQuestion();
      if (state.mode === "speed") setTimeout(renderNextQuestion, 550);
    }

    function endGame() {
      clearInterval(state.timer);
      state.timer = null;
      showScreen("result");

      const accuracy = state.answered ? Math.round((state.correct / state.answered) * 100) : 0;
      $("finalScore").textContent = state.score;
      $("correctCount").textContent = state.correct;
      $("answerCount").textContent = state.answered;
      $("accuracy").textContent = `${accuracy}%`;
      $("bestCombo").textContent = `x${state.bestCombo}`;
      $("wrongCount").textContent = state.wrongItems.length;
      $("retryWrongBtn").disabled = state.wrongItems.length === 0;

      let medal = "🥉";
      let text = "继续努力，下一轮会更好！";
      if (accuracy >= 90) { medal = "🏆🏆🏆"; text = "班级王者！同学们可以挑战你了！"; }
      else if (accuracy >= 75) { medal = "🥇🥇"; text = "表现很棒，课堂节奏掌握得很好！"; }
      else if (accuracy >= 60) { medal = "🥈"; text = "不错！再练错题就能冲高分！"; }

      $("medal").textContent = medal;
      $("resultText").textContent = text;
    }

    function bindEvents() {
      lessonChips.addEventListener("click", (e) => {
        const btn = e.target.closest("[data-lesson]");
        if (!btn) return;
        state.lessonType = btn.dataset.lesson;
        renderChips();
      });

      modeChips.addEventListener("click", (e) => {
        const btn = e.target.closest("[data-mode]");
        if (!btn) return;
        state.mode = btn.dataset.mode;
        renderChips();
      });

      $("toggleSound").addEventListener("click", () => {
        state.soundOn = !state.soundOn;
        $("toggleSound").textContent = state.soundOn ? "🔊 音效：开" : "🔇 音效：关";
        $("toggleSound").classList.toggle("active", state.soundOn);
      });

      $("toggleWrongOnly").addEventListener("click", () => {
        state.wrongOnly = !state.wrongOnly;
        $("toggleWrongOnly").textContent = state.wrongOnly ? "错题优先：开" : "错题优先：关";
        $("toggleWrongOnly").classList.toggle("active", state.wrongOnly);
      });

      $("startBtn").addEventListener("click", () => {
        state.wrongRetryMode = false;
        startGame();
      });

      submitBtn.addEventListener("click", handleDoubleSubmit);
      nextBtn.addEventListener("click", renderNextQuestion);

      $("backBtn").addEventListener("click", () => {
        clearInterval(state.timer);
        showScreen("start");
      });

      $("retryWrongBtn").addEventListener("click", () => {
        state.wrongRetryMode = true;
        state.wrongOnly = true;
        $("toggleWrongOnly").textContent = "错题优先：开";
        $("toggleWrongOnly").classList.add("active");
        showScreen("start");
      });

      $("playAgainBtn").addEventListener("click", () => {
        state.wrongRetryMode = false;
        showScreen("start");
      });

      $("toHomeBtn").addEventListener("click", () => {
        state.wrongRetryMode = false;
        showScreen("start");
      });

      document.addEventListener("keydown", (e) => {
        if (!screens.game.classList.contains("active")) return;
        if (!state.answeredLocked && ["1", "2", "3", "4"].includes(e.key)) {
          handleChoice(Number(e.key) - 1);
        }
        if (e.key === "Enter") {
          if (state.lessonType === "pp_game" && state.mode === "double" && !submitBtn.hidden) {
            handleDoubleSubmit();
          } else if (state.answeredLocked && !nextBtn.hidden) {
            renderNextQuestion();
          }
        }
      });
    }

    renderWordTable();
    renderChips();
    bindEvents();
  </script>
</body>
</html>
